<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form - FlyForms</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #000;
            --primary-hover: #333;
            --text-color: #000;
            --text-secondary: #666;
            --border-color: #ddd;
            --border-hover: #999;
            --bg-hover: #f9f9f9;
            --bg-color: #fff;
            --error-color: #e74c3c;
            --animation-duration: 0.5s;
            --border-radius: 8px;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            width: 100%;
            position: relative;
            overflow-x: hidden;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .progress {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: rgba(128, 128, 128, 0.2);
            z-index: 100;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            width: 0;
            background: var(--primary-color);
            transition: width 0.6s cubic-bezier(0.65, 0, 0.35, 1);
            box-shadow: 0 0 8px rgba(0, 0, 0, 0.2);
        }

        .container {
            max-width: 650px;
            margin: 0 auto;
            padding: 40px 25px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .logo {
            position: absolute;
            top: 40px;
            left: 25px;
            font-weight: 600;
            font-size: 22px;
            letter-spacing: -0.5px;
            transition: all 0.3s ease;
        }

        .branding {
            position: fixed;
            bottom: 20px;
            left: 0;
            width: 100%;
            text-align: center;
            font-size: 13px;
            color: var(--text-secondary);
            padding: 10px;
            z-index: 10;
            opacity: 0.8;
            transition: opacity 0.3s ease;
        }

        .branding:hover {
            opacity: 1;
        }

        .branding a {
            color: var(--text-color);
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .branding a:hover {
            opacity: 0.8;
        }

        .create-own {
            display: block;
            margin-top: 5px;
            font-size: 12px;
            color: var(--text-secondary);
            text-decoration: underline;
        }

        .slide {
            display: none;
            padding-top: 130px;
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.7s ease, transform 0.7s ease;
            will-change: opacity, transform;
            pointer-events: none;
            height: 100vh;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .slide.active {
            display: block;
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        h1 {
            font-size: 32px;
            font-weight: 600;
            margin-bottom: 20px;
            line-height: 1.3;
            letter-spacing: -0.5px;
        }

        p {
            font-size: 17px;
            font-weight: 400;
            color: var(--text-secondary);
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .input {
            width: 100%;
            padding: 16px;
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius);
            font-family: 'Inter', sans-serif;
            font-size: 16px;
            margin-bottom: 30px;
            transition: all 0.3s ease;
            background-color: var(--bg-color);
            color: var(--text-color);
        }

        .input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 2px rgba(0, 0, 0, 0.1);
        }

        textarea.input {
            min-height: 130px;
            resize: none;
        }

        .btn {
            width: 100%;
            padding: 16px;
            background: var(--primary-color);
            color: var(--bg-color);
            border: none;
            border-radius: var(--border-radius);
            font-family: 'Inter', sans-serif;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .btn:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .btn:active {
            transform: scale(0.98);
            box-shadow: none;
        }

        .btn-back {
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
            margin-top: 15px;
        }

        .btn-back:hover {
            background: var(--bg-hover);
            color: var(--text-color);
            border-color: var(--border-hover);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
        }

        .btn-ripple {
            position: absolute;
            border-radius: 50%;
            background-color: rgba(255, 255, 255, 0.4);
            transform: scale(0);
            animation: ripple 0.6s linear;
            pointer-events: none;
        }

        @keyframes ripple {
            to {
                transform: scale(4);
                opacity: 0;
            }
        }

        .rating-group {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 35px;
        }

        .rating-btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: 1px solid var(--border-color);
            background: transparent;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
            color: var(--text-color);
        }

        .rating-btn:hover {
            border-color: var(--border-hover);
            background: var(--bg-hover);
            transform: translateY(-2px);
        }

        .rating-btn.selected {
            background: var(--primary-color);
            color: var(--bg-color);
            border-color: var(--primary-color);
            transform: scale(1.1);
            font-weight: 600;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 35px;
        }

        .option {
            padding: 18px;
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius);
            cursor: pointer;
            text-align: left;
            transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
            background-color: var(--bg-color);
        }

        .option:hover {
            border-color: var(--border-hover);
            background: var(--bg-hover);
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
        }

        .option.selected {
            border-color: var(--primary-color);
            background: var(--bg-hover);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            transform: translateY(-3px);
        }

        .option h3 {
            font-size: 17px;
            font-weight: 500;
            margin-bottom: 6px;
            color: var(--text-color);
        }

        .option p {
            font-size: 14px;
            margin-bottom: 0;
            color: var(--text-secondary);
        }

        .checkbox-option {
            display: flex;
            align-items: flex-start;
            padding: 15px 18px;
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius);
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
            background-color: var(--bg-color);
        }

        .checkbox-option:hover {
            border-color: var(--border-hover);
            background: var(--bg-hover);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
        }

        .checkbox-option.selected {
            border-color: var(--primary-color);
            background: var(--bg-hover);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .checkbox-option input {
            margin-right: 12px;
            margin-top: 3px;
            accent-color: var(--primary-color);
            transform: scale(1.2);
        }

        .checkbox-option label {
            flex: 1;
            cursor: pointer;
            color: var(--text-color);
            font-size: 16px;
        }

        .success {
            text-align: center;
            padding-top: 60px;
        }

        .checkmark {
            width: 90px;
            height: 90px;
            margin: 0 auto 35px;
            animation: checkmark-appear 1s cubic-bezier(0.65, 0, 0.35, 1) forwards;
        }

        @keyframes checkmark-appear {
            0% {
                opacity: 0;
                transform: scale(0.5);
            }
            50% {
                opacity: 1;
                transform: scale(1.1);
            }
            70% {
                transform: scale(0.95);
            }
            100% {
                transform: scale(1);
            }
        }

        .checkmark svg {
            width: 100%;
            height: 100%;
            stroke: var(--primary-color);
        }

        .checkmark svg circle {
            stroke: var(--primary-color);
            stroke-dasharray: 166;
            stroke-dashoffset: 166;
            animation: stroke 0.6s cubic-bezier(0.65, 0, 0.35, 1) forwards;
            animation-delay: 0.2s;
        }

        .checkmark svg path {
            stroke: var(--primary-color);
            stroke-dasharray: 48;
            stroke-dashoffset: 48;
            animation: stroke 0.3s cubic-bezier(0.65, 0, 0.35, 1) forwards;
            animation-delay: 0.8s;
        }

        @keyframes stroke {
            100% {
                stroke-dashoffset: 0;
            }
        }

        .error-state {
            text-align: center;
            padding-top: 60px;
        }

        .error-icon {
            width: 90px;
            height: 90px;
            margin: 0 auto 35px;
            color: var(--error-color);
            animation: error-appear 0.5s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        @keyframes error-appear {
            0% {
                opacity: 0;
                transform: scale(0.5) rotate(-10deg);
            }
            50% {
                transform: scale(1.1) rotate(5deg);
            }
            70% {
                transform: scale(0.95) rotate(0deg);
            }
            100% {
                opacity: 1;
                transform: scale(1) rotate(0deg);
            }
        }

        .error-icon svg {
            width: 100%;
            height: 100%;
            stroke: var(--error-color);
            stroke-width: 2;
        }

        .loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-color);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 1;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }

        .loading.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .loading-logo {
            margin-bottom: 20px;
            font-weight: 600;
            font-size: 24px;
            letter-spacing: -0.5px;
        }

        .loading-text {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 25px;
        }

        .loading-bar {
            width: 200px;
            height: 4px;
            background: rgba(0, 0, 0, 0.1);
            border-radius: 2px;
            overflow: hidden;
            position: relative;
        }

        .loading-progress {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 0;
            background: var(--primary-color);
            animation: loading-progress 2s ease-in-out forwards;
        }

        @keyframes loading-progress {
            0% { width: 0; }
            50% { width: 70%; }
            100% { width: 100%; }
        }

        .scale-container {
            margin-bottom: 30px;
            width: 100%;
        }

        .scale-slider {
            width: 100%;
            height: 6px;
            -webkit-appearance: none;
            appearance: none;
            background: var(--border-color);
            border-radius: 3px;
            outline: none;
            margin-bottom: 15px;
        }

        .scale-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 22px;
            height: 22px;
            background: var(--primary-color);
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .scale-slider::-moz-range-thumb {
            width: 22px;
            height: 22px;
            background: var(--primary-color);
            border-radius: 50%;
            cursor: pointer;
            border: none;
            transition: all 0.3s ease;
        }

        .scale-slider::-webkit-slider-thumb:hover {
            transform: scale(1.2);
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
        }

        .scale-slider::-moz-range-thumb:hover {
            transform: scale(1.2);
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
        }

        .scale-value {
            text-align: center;
            font-size: 20px;
            font-weight: 600;
            color: var(--primary-color);
        }

        .file-input {
            padding: 12px;
            background: var(--bg-hover);
        }

        .location-btn {
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .location-btn svg {
            width: 18px;
            height: 18px;
        }

        /* Swipe Navigation */
        .swipe-indicator {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            animation: pulse 2s infinite;
            opacity: 0.7;
        }

        .swipe-indicator svg {
            width: 20px;
            height: 20px;
            stroke: var(--text-secondary);
        }

        /* Scroll Navigation */
        .scroll-indicator {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            opacity: 0.7;
            transition: opacity 0.3s ease;
            animation: bounce 2s infinite;
        }

        .scroll-indicator:hover {
            opacity: 1;
        }

        .scroll-indicator svg {
            width: 24px;
            height: 24px;
            stroke: var(--text-secondary);
        }

        .scroll-indicator-text {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 5px;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {
                transform: translateY(0) translateX(-50%);
            }
            40% {
                transform: translateY(-10px) translateX(-50%);
            }
            60% {
                transform: translateY(-5px) translateX(-50%);
            }
        }

        /* Responsive improvements */
        @media (max-width: 768px) {
            .container {
                padding: 30px 20px;
            }
            
            h1 {
                font-size: 28px;
            }
            
            p {
                font-size: 16px;
            }
            
            .slide {
                padding-top: 110px;
            }
            
            .logo {
                font-size: 20px;
                top: 30px;
            }
            
            .checkmark, .error-icon {
                width: 80px;
                height: 80px;
                margin-bottom: 25px;
            }
        }

        @media (max-width: 480px) {
            .options {
                grid-template-columns: 1fr;
            }
            
            h1 {
                font-size: 24px;
            }
            
            .slide {
                padding-top: 90px;
            }
            
            .logo {
                font-size: 18px;
                top: 25px;
                left: 20px;
            }
            
            .input, .btn {
                padding: 14px;
            }
            
            .rating-group {
                justify-content: center;
            }
            
            .rating-btn {
                width: 42px;
                height: 42px;
            }
            
            .option {
                padding: 15px;
            }
            
            .option h3 {
                font-size: 16px;
            }
            
            .branding {
                font-size: 12px;
            }
        }

        /* Additional animations */
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .btn-submit {
            animation: pulse 2s infinite;
        }

        /* Scroll-based slide navigation */
        .scroll-nav {
            position: fixed;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 100;
        }

        .scroll-nav-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.2);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .scroll-nav-dot.active {
            background: var(--primary-color);
            transform: scale(1.3);
        }
    </style>
</head>
<body>
    <div class="progress">
        <div class="progress-bar" id="progress"></div>
    </div>
    
    <div class="loading" id="loading">
        <div class="loading-logo">FlyForms</div>
        <div class="loading-text">powered by FlyForms</div>
        <div class="loading-bar">
            <div class="loading-progress"></div>
        </div>
    </div>
    
    <div class="container" id="form-container">
        <div class="logo" id="form-logo">FlyForms</div>
        
        <!-- This will be populated dynamically -->
    </div>
    
    <div class="scroll-nav" id="scroll-nav">
        <!-- This will be populated dynamically -->
    </div>
    
    <div class="branding">
        Made with <a href="https://flyforms.stmy.me/">FlyForms</a>
    </div>

    <script>
        // Assume API_URL is defined in config.js
        const API_URL = "https://chat-8ynk.onrender.com";
        
        // Extract the form ID from the URL path
        const path = window.location.pathname;
        let formSlug = null;
        let formState = null;
        let isLoading = true;
        let formFound = false;
        let touchStartY = 0;
        let touchEndY = 0;
        
        // Check if the URL follows the pattern /f/directid
        if (path.includes('/f/')) {
            // Extract the ID after /f/
            const segments = path.split('/');
            const fIndex = segments.indexOf('f');
            if (fIndex !== -1 && fIndex < segments.length - 1) {
                formSlug = segments[fIndex + 1];
            }
        } else {
            // If URL doesn't have /f/ pattern, set formFound to false immediately
            formFound = false;
        }
        
        document.addEventListener('DOMContentLoaded', function() {
            // Show loading state
            showLoading();
            
            // If formSlug was found, load the form, otherwise show error
            if (formSlug) {
                // Load form with a slight delay to ensure loading state is visible
                setTimeout(() => {
                    loadForm(formSlug);
                }, 1500); // Longer delay to show the loading animation
            } else {
                // Render page not found after loading animation
                setTimeout(() => {
                    renderErrorState();
                    hideLoading();
                }, 1500);
            }
            
            // Add ripple effect to buttons
            document.addEventListener('click', function(e) {
                if (e.target.classList.contains('btn')) {
                    createRipple(e);
                }
            });
            
            // Add touch event listeners for swipe navigation
            document.addEventListener('touchstart', handleTouchStart, false);
            document.addEventListener('touchend', handleTouchEnd, false);
        });
        
        function createRipple(event) {
            const button = event.currentTarget;
            const circle = document.createElement("span");
            const diameter = Math.max(button.clientWidth, button.clientHeight);
            const radius = diameter / 2;
            
            circle.style.width = circle.style.height = `${diameter}px`;
            circle.style.left = `${event.clientX - button.getBoundingClientRect().left - radius}px`;
            circle.style.top = `${event.clientY - button.getBoundingClientRect().top - radius}px`;
            circle.classList.add("btn-ripple");
            
            // Remove existing ripples
            const ripple = button.getElementsByClassName("btn-ripple")[0];
            if (ripple) {
                ripple.remove();
            }
            
            button.appendChild(circle);
            
            // Remove ripple after animation completes
            setTimeout(() => {
                circle.remove();
            }, 600);
        }
        
        function showLoading() {
            const loading = document.getElementById('loading');
            loading.classList.remove('hidden');
            isLoading = true;
        }
        
        function hideLoading() {
            const loading = document.getElementById('loading');
            loading.classList.add('hidden');
            isLoading = false;
            
            // Actually remove the loading element after animation completes
            setTimeout(() => {
                if (!isLoading) {
                    loading.style.display = 'none';
                }
            }, 500);
        }
        
        async function loadForm(slug) {
            try {
                // Fetch form data from the API
                const response = await fetch(`${API_URL}/f/${slug}`);
                
                if (!response.ok) {
                    // If form not found, show error state
                    formFound = false;
                    renderErrorState();
                    hideLoading();
                    return;
                }
                
                const formData = await response.json();
                formFound = true;
                
                // Build the form UI
                buildFormUI(formData);
                
                // Create scroll navigation dots
                createScrollNav(formData);
                
                // Hide loading spinner with a slight delay for smooth transition
                setTimeout(() => {
                    hideLoading();
                }, 200);
                
            } catch (error) {
                console.error('Error loading form:', error);
                formFound = false;
                renderErrorState();
                hideLoading();
            }
        }
        
        function createScrollNav(formData) {
            const scrollNav = document.getElementById('scroll-nav');
            scrollNav.innerHTML = '';
            
            // Create a dot for the start screen
            const startDot = document.createElement('div');
            startDot.className = 'scroll-nav-dot active';
            startDot.dataset.slide = 'start';
            startDot.addEventListener('click', () => navigateToSlide('start'));
            scrollNav.appendChild(startDot);
            
            // Create dots for each question
            formData.questions.forEach(question => {
                const dot = document.createElement('div');
                dot.className = 'scroll-nav-dot';
                dot.dataset.slide = question.id;
                dot.addEventListener('click', () => navigateToSlide(question.id));
                scrollNav.appendChild(dot);
            });
            
            // Create a dot for the end screen
            const endDot = document.createElement('div');
            endDot.className = 'scroll-nav-dot';
            endDot.dataset.slide = 'end';
            endDot.addEventListener('click', () => navigateToSlide('end'));
            scrollNav.appendChild(endDot);
        }
        
        function updateScrollNav() {
            const dots = document.querySelectorAll('.scroll-nav-dot');
            dots.forEach(dot => {
                if (dot.dataset.slide === formState.currentSlide) {
                    dot.classList.add('active');
                } else {
                    dot.classList.remove('active');
                }
            });
        }
        
        function renderErrorState() {
            const container = document.getElementById('form-container');
            
            // Clear any existing content
            container.innerHTML = '';
            
            // Add logo
            const logoElement = document.createElement('div');
            logoElement.className = 'logo';
            logoElement.textContent = 'FlyForms';
            container.appendChild(logoElement);
            
            // Create error slide
            const errorSlide = document.createElement('div');
            errorSlide.className = 'slide';
            errorSlide.id = 'error-slide';
            
            const errorState = document.createElement('div');
            errorState.className = 'error-state';
            
            const errorIcon = document.createElement('div');
            errorIcon.className = 'error-icon';
            errorIcon.innerHTML = `

        function createQuestionSlide(question, index) {
            const slide = document.createElement('div');
            slide.className = 'slide';
            slide.id = `slide-${question.id}`;
            
            const title = document.createElement('h1');
            title.textContent = question.title;
            slide.appendChild(title);
            
            if (question.description) {
                const description = document.createElement('p');
                description.textContent = question.description;
                slide.appendChild(description);
            }
            
            // Create different input types based on question type
            switch (question.type) {
                case 'text':
                case 'paragraph':
                case 'email':
                case 'url':
                case 'phone':
                case 'number':
                    const input = document.createElement(question.type === 'paragraph' ? 'textarea' : 'input');
                    input.className = 'input';
                    input.id = `input-${question.id}`;
                    input.placeholder = question.placeholder || `Enter your ${question.type === 'paragraph' ? 'answer' : question.type}`;
                    
                    if (question.type === 'email') {
                        input.type = 'email';
                    } else if (question.type === 'url') {
                        input.type = 'url';
                    } else if (question.type === 'phone') {
                        input.type = 'tel';
                    } else if (question.type === 'number') {
                        input.type = 'number';
                        if (question.min_value !== undefined) input.min = question.min_value;
                        if (question.max_value !== undefined) input.max = question.max_value;
                    } else if (question.type !== 'paragraph') {
                        input.type = 'text';
                    }
                    
                    slide.appendChild(input);
                    break;
                    
                case 'multiple_choice':
                    const options = document.createElement('div');
                    options.className = 'options';
                    
                    question.options.forEach(option => {
                        const optionElement = document.createElement('div');
                        optionElement.className = 'option';
                        optionElement.dataset.value = option.value;
                        optionElement.onclick = function() {
                            // Deselect all other options
                            const allOptions = this.parentNode.querySelectorAll('.option');
                            allOptions.forEach(opt => opt.classList.remove('selected'));
                            
                            // Select this option
                            this.classList.add('selected');
                        };
                        
                        const optionTitle = document.createElement('h3');
                        optionTitle.textContent = option.label;
                        optionElement.appendChild(optionTitle);
                        
                        if (option.description) {
                            const optionDesc = document.createElement('p');
                            optionDesc.textContent = option.description;
                            optionElement.appendChild(optionDesc);
                        }
                        
                        options.appendChild(optionElement);
                    });
                    
                    slide.appendChild(options);
                    break;
                    
                case 'checkbox':
                    const checkboxes = document.createElement('div');
                    checkboxes.className = 'checkbox-list';
                    
                    question.options.forEach(option => {
                        const checkboxOption = document.createElement('div');
                        checkboxOption.className = 'checkbox-option';
                        checkboxOption.dataset.value = option.value;
                        checkboxOption.onclick = function() {
                            this.classList.toggle('selected');
                            const checkbox = this.querySelector('input[type="checkbox"]');
                            checkbox.checked = !checkbox.checked;
                        };
                        
                        const checkbox = document.createElement('input');
                        checkbox.type = 'checkbox';
                        checkbox.value = option.value;
                        checkbox.id = `checkbox-${question.id}-${option.value}`;
                        checkbox.onclick = (e) => {
                            e.stopPropagation();
                            checkboxOption.classList.toggle('selected');
                        };
                        
                        const label = document.createElement('label');
                        label.textContent = option.label;
                        label.htmlFor = checkbox.id;
                        
                        checkboxOption.appendChild(checkbox);
                        checkboxOption.appendChild(label);
                        checkboxes.appendChild(checkboxOption);
                    });
                    
                    slide.appendChild(checkboxes);
                    break;
                    
                case 'dropdown':
                    const select = document.createElement('select');
                    select.className = 'input';
                    select.id = `input-${question.id}`;
                    
                    const defaultOption = document.createElement('option');
                    defaultOption.value = '';
                    defaultOption.textContent = 'Select an option';
                    defaultOption.selected = true;
                    defaultOption.disabled = true;
                    select.appendChild(defaultOption);
                    
                    question.options.forEach(option => {
                        const optionElement = document.createElement('option');
                        optionElement.value = option.value;
                        optionElement.textContent = option.label;
                        select.appendChild(optionElement);
                    });
                    
                    slide.appendChild(select);
                    break;
                    
                case 'rating':
                    const ratingGroup = document.createElement('div');
                    ratingGroup.className = 'rating-group';
                    
                    const maxRating = question.max_value || 5;
                    for (let i = 1; i <= maxRating; i++) {
                        const ratingBtn = document.createElement('button');
                        ratingBtn.className = 'rating-btn';
                        ratingBtn.textContent = i;
                        ratingBtn.dataset.value = i;
                        ratingBtn.onclick = function() {
                            // Deselect all rating buttons
                            const allRatings = this.parentNode.querySelectorAll('.rating-btn');
                            allRatings.forEach(btn => btn.classList.remove('selected'));
                            
                            // Select this rating
                            this.classList.add('selected');
                        };
                        
                        ratingGroup.appendChild(ratingBtn);
                    }
                    
                    slide.appendChild(ratingGroup);
                    break;
                    
                case 'scale':
                    const scaleContainer = document.createElement('div');
                    scaleContainer.className = 'scale-container';
                    
                    const minValue = question.min_value || 0;
                    const maxValue = question.max_value || 10;
                    
                    const slider = document.createElement('input');
                    slider.type = 'range';
                    slider.className = 'scale-slider';
                    slider.min = minValue;
                    slider.max = maxValue;
                    slider.value = Math.floor((maxValue - minValue) / 2) + minValue;
                    
                    const scaleValue = document.createElement('div');
                    scaleValue.className = 'scale-value';
                    scaleValue.textContent = slider.value;
                    
                    slider.oninput = function() {
                        scaleValue.textContent = this.value;
                    };
                    
                    scaleContainer.appendChild(slider);
                    scaleContainer.appendChild(scaleValue);
                    slide.appendChild(scaleContainer);
                    break;
                    
                case 'date':
                    const dateInput = document.createElement('input');
                    dateInput.type = 'date';
                    dateInput.className = 'input';
                    dateInput.id = `input-${question.id}`;
                    slide.appendChild(dateInput);
                    break;
                    
                case 'time':
                    const timeInput = document.createElement('input');
                    timeInput.type = 'time';
                    timeInput.className = 'input';
                    timeInput.id = `input-${question.id}`;
                    slide.appendChild(timeInput);
                    break;
                    
                case 'file':
                    const fileInput = document.createElement('input');
                    fileInput.type = 'file';
                    fileInput.className = 'input file-input';
                    fileInput.id = `input-${question.id}`;
                    
                    if (question.accept) {
                        fileInput.accept = question.accept;
                    }
                    
                    if (question.multiple) {
                        fileInput.multiple = true;
                    }
                    
                    slide.appendChild(fileInput);
                    break;
                    
                case 'location':
                    const locationInput = document.createElement('input');
                    locationInput.type = 'text';
                    locationInput.className = 'input';
                    locationInput.id = `input-${question.id}`;
                    locationInput.placeholder = 'Enter your location';
                    
                    const locationButton = document.createElement('button');
                    locationButton.className = 'btn btn-back location-btn';
                    locationButton.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg> Use Current Location';
                    locationButton.onclick = function(e) {
                        e.preventDefault();
                        if (navigator.geolocation) {
                            locationButton.disabled = true;
                            locationButton.innerHTML = '<span class="spinner"></span> Getting location...';
                            
                            navigator.geolocation.getCurrentPosition(position => {
                                const latitude = position.coords.latitude;
                                const longitude = position.coords.longitude;
                                locationInput.value = `${latitude}, ${longitude}`;
                                
                                locationButton.disabled = false;
                                locationButton.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg> Use Current Location';
                            }, () => {
                                alert('Unable to retrieve your location');
                                locationButton.disabled = false;
                                locationButton.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg> Use Current Location';
                            });
                        } else {
                            alert('Geolocation is not supported by your browser');
                        }
                    };
                    
                    slide.appendChild(locationInput);
                    slide.appendChild(locationButton);
                    break;
            }
            
            // Add navigation buttons
            const buttonContainer = document.createElement('div');
            buttonContainer.className = 'button-container';
            
            const nextButton = document.createElement('button');
            nextButton.className = 'btn';
            if (index === formState?.formData?.questions.length - 1) {
                nextButton.textContent = 'Submit';
                nextButton.classList.add('btn-submit');
            } else {
                nextButton.textContent = 'Continue';
            }
            nextButton.onclick = () => navigateToNextSlide(question.id);
            
            const backButton = document.createElement('button');
            backButton.className = 'btn btn-back';
            backButton.textContent = 'Back';
            backButton.onclick = () => navigateToPrevSlide(question.id, index);
            
            buttonContainer.appendChild(nextButton);
            buttonContainer.appendChild(backButton);
            slide.appendChild(buttonContainer);
            
            // Add scroll/swipe indicator if not the last question
            if (index < formState?.formData?.questions.length - 1) {
                const swipeIndicator = document.createElement('div');
                swipeIndicator.className = 'scroll-indicator';
                swipeIndicator.innerHTML = `
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 5v14M5 12l7 7 7-7"/>
                    </svg>
                    <div class="scroll-indicator-text">Scroll or swipe to continue</div>
                `;
                slide.appendChild(swipeIndicator);
            }
            
            return slide;
        }
        
        function navigateToSlide(slideId) {
            if (!formFound) return;
            
            // Get the current slide
            const currentSlide = document.querySelector('.slide.active');
            const currentId = formState.currentSlide;
            
            // If navigating to the same slide, do nothing
            if (currentId === slideId) return;
            
            // If going to a question slide, validate current slide if needed
            if (currentId !== 'start' && currentId !== 'end' && slideId !== 'start') {
                const question = formState.formData.questions.find(q => q.id === currentId);
                
                // Validate required questions if we're moving forward
                if (question.required && getQuestionIndex(slideId) > getQuestionIndex(currentId)) {
                    if (!validateQuestion(currentId)) {
                        // Show validation error with a shake animation
                        currentSlide.style.animation = 'shake 0.5s cubic-bezier(.36,.07,.19,.97) both';
                        setTimeout(() => {
                            currentSlide.style.animation = '';
                        }, 500);
                        
                        alert('Please answer this question before continuing.');
                        return;
                    }
                }
                
                // Collect the answer from current slide
                collectAnswer(currentId);
            }
            
            // Add exit animation to current slide - make this smoother
            currentSlide.style.opacity = '0';
            currentSlide.style.transform = 'translateY(-30px)';
            
            // After a short delay, switch slides
            setTimeout(() => {
                // Remove active class
                currentSlide.classList.remove('active');
                
                // Reset transform and opacity
                currentSlide.style.transform = 'translateY(30px)';
                
                // Get the next slide
                const nextSlide = document.getElementById(`slide-${slideId}`);
                
                // Apply initial position before showing
                nextSlide.style.opacity = '0';
                nextSlide.style.transform = 'translateY(30px)';
                
                // Add active class to show the slide
                nextSlide.classList.add('active');
                
                // Force reflow
                void nextSlide.offsetWidth;
                
                // Apply transition to visible state
                nextSlide.style.opacity = '1';
                nextSlide.style.transform = 'translateY(0)';
                
                // Update current slide in state
                formState.currentSlide = slideId;
                
                // Update progress bar
                updateProgress();
                
                // Update scroll navigation
                updateScrollNav();
                
                // Auto-focus first input in the new slide if present
                const firstInput = nextSlide.querySelector('input, textarea, select');
                if (firstInput) {
                    setTimeout(() => {
                        firstInput.focus();
                    }, 400);
                }
            }, 400);
        }
        
        function getQuestionIndex(slideId) {
            if (slideId === 'start') return -1;
            if (slideId === 'end') return formState.formData.questions.length;
            
            return formState.formData.questions.findIndex(q => q.id === slideId);
        }
        
        function navigateToNextSlide(currentId) {
            if (!formFound) return;
            
            // Determine the next slide
            let nextId;
            
            if (currentId === 'start') {
                // If we're on the start screen, go to the first question
                nextId = formState.formData.questions[0].id;
            } else if (currentId === 'end') {
                // If we're on the end screen, reset the form
                resetForm();
                return;
            } else {
                // Validate required questions
                if (!validateQuestion(currentId)) {
                    return;
                }
                
                // Find the current question index
                const currentIndex = formState.formData.questions.findIndex(q => q.id === currentId);
                
                if (currentIndex === formState.formData.questions.length - 1) {
                    // If this is the last question, we need to submit the form
                    // Get the current slide
                    const currentSlide = document.getElementById(`slide-${currentId}`);
                    
                    // Add exit animation to current slide
                    currentSlide.style.opacity = '0';
                    currentSlide.style.transform = 'translateY(-30px)';
                    
                    // Show loading state
                    showLoading();
                    
                    // Submit the form with a slight delay for animation
                    setTimeout(() => {
                        submitForm().then(() => {
                            // Remove active class
                            currentSlide.classList.remove('active');
                            
                            // Set next slide to end screen
                            nextId = 'end';
                            
                            // Get the end slide
                            const nextSlide = document.getElementById(`slide-${nextId}`);
                            
                            // Apply initial position before showing
                            nextSlide.style.opacity = '0';
                            nextSlide.style.transform = 'translateY(30px)';
                            
                            // Add active class to show the slide
                            nextSlide.classList.add('active');
                            
                            // Force reflow
                            void nextSlide.offsetWidth;
                            
                            // Apply transition to visible state
                            nextSlide.style.opacity = '1';
                            nextSlide.style.transform = 'translateY(0)';
                            
                            // Update current slide in state
                            formState.currentSlide = nextId;
                            
                            // Update progress bar
                            updateProgress();
                            
                            // Update scroll navigation
                            updateScrollNav();
                            
                            // Hide loading
                            hideLoading();
                        });
                    }, 400);
                    
                    return;
                } else {
                    // Otherwise go to the next question
                    nextId = formState.formData.questions[currentIndex + 1].id;
                }
            }
            
            // Navigate to the next slide
            navigateToSlide(nextId);
        }
        
        function navigateToPrevSlide(currentId, currentIndex) {
            if (!formFound) return;
            
            // Determine the previous slide
            let prevId;
            
            if (currentIndex === 0) {
                // If we're on the first question, go back to start screen
                prevId = 'start';
            } else {
                // Otherwise go to the previous question
                prevId = formState.formData.questions[currentIndex - 1].id;
            }
            
            // Navigate to the previous slide
            navigateToSlide(prevId);
        }
        
        function validateQuestion(questionId) {
            const question = formState.formData.questions.find(q => q.id === questionId);
            
            // If question is not required, no need to validate
            if (!question.required) return true;
            
            const slide = document.getElementById(`slide-${questionId}`);
            let answer = null;
            
            switch (question.type) {
                case 'text':
                case 'paragraph':
                case 'email':
                case 'url':
                case 'phone':
                case 'number':
                case 'date':
                case 'time':
                case 'location':
                    answer = document.getElementById(`input-${question.id}`).value;
                    break;
                    
                case 'multiple_choice':
                    const selectedOption = slide.querySelector('.option.selected');
                    if (selectedOption) {
                        answer = selectedOption.dataset.value;
                    }
                    break;
                    
                case 'checkbox':
                    const selectedCheckboxes = slide.querySelectorAll('.checkbox-option.selected');
                    if (selectedCheckboxes.length > 0) {
                        answer = Array.from(selectedCheckboxes).map(cb => cb.dataset.value);
                    }
                    break;
                    
                case 'dropdown':
                    answer = document.getElementById(`input-${question.id}`).value;
                    break;
                    
                case 'rating':
                    const selectedRating = slide.querySelector('.rating-btn.selected');
                    if (selectedRating) {
                        answer = selectedRating.dataset.value;
                    }
                    break;
                    
                case 'scale':
                    answer = slide.querySelector('.scale-slider').value;
                    break;
                    
                case 'file':
                    const fileInput = document.getElementById(`input-${question.id}`);
                    if (fileInput.files.length > 0) {
                        answer = 'Files selected'; // We can't actually upload files in this demo
                    }
                    break;
            }
            
            // Add shake animation if it doesn't exist
            if (!document.querySelector('style#shake-animation')) {
                const styleSheet = document.createElement('style');
                styleSheet.id = 'shake-animation';
                styleSheet.textContent = `
                    @keyframes shake {
                        10%, 90% { transform: translate3d(-1px, 0, 0); }
                        20%, 80% { transform: translate3d(2px, 0, 0); }
                        30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
                        40%, 60% { transform: translate3d(4px, 0, 0); }
                    }
                `;
                document.head.appendChild(styleSheet);
            }
            
            return !!answer;
        }
        
        function collectAnswer(questionId) {
            const question = formState.formData.questions.find(q => q.id === questionId);
            const slide = document.getElementById(`slide-${questionId}`);
            let answer;
            
            switch (question.type) {
                case 'text':
                case 'paragraph':
                case 'email':
                case 'url':
                case 'phone':
                case 'number':
                case 'date':
                case 'time':
                case 'location':
                    answer = document.getElementById(`input-${question.id}`).value;
                    break;
                    
                case 'multiple_choice':
                    const selectedOption = slide.querySelector('.option.selected');
                    if (selectedOption) {
                        answer = selectedOption.dataset.value;
                    }
                    break;
                    
                case 'checkbox':
                    const selectedCheckboxes = slide.querySelectorAll('.checkbox-option.selected');
                    if (selectedCheckboxes.length > 0) {
                        answer = Array.from(selectedCheckboxes).map(cb => cb.dataset.value);
                    }
                    break;
                    
                case 'dropdown':
                    answer = document.getElementById(`input-${question.id}`).value;
                    break;
                    
                case 'rating':
                    const selectedRating = slide.querySelector('.rating-btn.selected');
                    if (selectedRating) {
                        answer = selectedRating.dataset.value;
                    }
                    break;
                    
                case 'scale':
                    answer = slide.querySelector('.scale-slider').value;
                    break;
                    
                case 'file':
                    // In a real app, we would handle file uploads here
                    answer = 'File upload placeholder';
                    break;
            }
            
            if (answer !== undefined) {
                formState.answers[questionId] = answer;
            }
        }
        
        async function submitForm() {
            try {
                // Submit answers to the API
                const response = await fetch(`${API_URL}/f/${formSlug}/submit`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(formState.answers)
                });
                
                const result = await response.json();
                
                if (!response.ok) {
                    throw new Error(result.detail || 'Failed to submit form');
                }
                
                // Check if there's dynamic content for the end screen
                if (result.end_screen && result.end_screen.dynamic_content) {
                    // Update end screen with dynamic content
                    const endScreen = document.getElementById('slide-end');
                    const endTitle = endScreen.querySelector('h1');
                    const endDescription = endScreen.querySelector('p');
                    
                    endTitle.textContent = result.end_screen.title || formState.formData.end_screen.title;
                    endDescription.textContent = result.end_screen.description || formState.formData.end_screen.description;
                }
                
                console.log('Form submitted successfully:', result);
                return result;
                
            } catch (error) {
                console.error('Error submitting form:', error);
                
                // Show error message
                alert('There was an error submitting your form. Please try again.');
                hideLoading();
                
                return null;
            }
        }
        
        function updateProgress() {
            if (!formState) return;
            
            let currentIndex;
            
            if (formState.currentSlide === 'start') {
                currentIndex = 0;
            } else if (formState.currentSlide === 'end') {
                currentIndex = formState.totalSlides - 1;
            } else {
                // Find the index of the current question
                const questionIndex = formState.formData.questions.findIndex(q => q.id === formState.currentSlide);
                currentIndex = questionIndex + 1; // +1 because we have the start screen before questions
            }
            
            const percent = (currentIndex / (formState.totalSlides - 1)) * 100;
            
            // Animate progress bar
            const progressBar = document.getElementById('progress');
            progressBar.style.width = percent + '%';
        }
        
        function resetForm() {
            // Clear all answers
            formState.answers = {};
            
            // Reset to start screen
            const currentSlide = document.querySelector('.slide.active');
            currentSlide.classList.remove('active');
            
            const startSlide = document.getElementById('slide-start');
            startSlide.classList.add('active');
            
            formState.currentSlide = 'start';
            
            // Reset all inputs
            document.querySelectorAll('.input').forEach(input => {
                input.value = '';
            });
            
            document.querySelectorAll('.option.selected, .checkbox-option.selected, .rating-btn.selected').forEach(selected => {
                selected.classList.remove('selected');
            });
            
            document.querySelectorAll('input[type="checkbox"]').forEach(checkbox => {
                checkbox.checked = false;
            });
            
            // Update progress bar
            updateProgress();
            
            // Update scroll navigation
            updateScrollNav();
        }
        
        // Touch event handlers for swipe navigation
        function handleTouchStart(event) {
            touchStartY = event.touches[0].clientY;
        }
        
        function handleTouchEnd(event) {
            touchEndY = event.changedTouches[0].clientY;
            handleSwipe();
        }
        
        function handleSwipe() {
            const swipeDistance = touchStartY - touchEndY;
            const minSwipeDistance = 50; // Minimum distance required for a swipe
            
            if (Math.abs(swipeDistance) < minSwipeDistance) return;
            
            if (swipeDistance > 0) {
                // Swiped up - go to next slide
                navigateToNextSlide(formState.currentSlide);
            } else {
                // Swiped down - go to previous slide
                const currentIndex = getQuestionIndex(formState.currentSlide);
                navigateToPrevSlide(formState.currentSlide, currentIndex);
            }
        }
    </script>
</body>
</html>
